<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Master Pro</title>
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<style>
  body { 
    text-align: center; 
    font-family: 'Segoe UI', Arial; 
    background: linear-gradient(135deg, #f0d9b5, #b58863); 
    margin: 0;
    padding: 20px;
  }
  h1 { color: #fff; text-shadow: 2px 2px 4px #000; }
  #board { width: 400px; max-width: 90vw; margin: 20px auto; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
  button { 
    padding: 12px 24px; margin: 8px; font-size: 16px; cursor: pointer; 
    background: #8b4513; color: white; border: none; border-radius: 8px; 
    font-weight: bold; transition: 0.2s;
  }
  button:hover { background: #654321; transform: scale(1.05); }
  button.active { background: #2e8b57; }
  #status { font-size: 20px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000; margin-top: 15px; }
</style>
</head>
<body>
<h1>♔ Chess Master Pro ♛</h1>
<button id="pvpBtn" onclick="startGame('pvp')">2 Player</button>
<button id="aiBtn" onclick="startGame('ai')">Vs Computer</button>
<button onclick="board.flip()">Flip Board</button>
<div id="board"></div>
<p id="status"></p>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
var board = null;
var game = new Chess();
var mode = 'pvp';

function onDragStart (source, piece) {
  if (game.game_over()) return false;
  if (mode === 'ai' && game.turn() === 'b') return false;
  if (piece.search(/^b/)!== -1 && game.turn() === 'w') return false;
  if (piece.search(/^w/)!== -1 && game.turn() === 'b') return false;
}

function makeAIMove() {
  var possibleMoves = game.moves({ verbose: true });
  if (possibleMoves.length === 0) return;
  
  // Simple AI: prefer captures
  var bestMove = null;
  for (var i = 0; i < possibleMoves.length; i++) {
    if (possibleMoves[i].captured) {
      bestMove = possibleMoves[i];
      break;
    }
  }
  if (!bestMove) {
    var randomIdx = Math.floor(Math.random() * possibleMoves.length);
    bestMove = possibleMoves[randomIdx];
  }
  
  game.move(bestMove);
  board.position(game.fen());
  updateStatus();
}

function onDrop (source, target) {
  var move = game.move({ from: source, to: target, promotion: 'q' });
  if (move === null) return 'snapback';
  updateStatus();
  
  if (mode === 'ai' &&!game.game_over()) {
    window.setTimeout(makeAIMove, 600);
  }
}

function onSnapEnd () { board.position(game.fen()); }

function updateStatus() {
  var status = '';
  var moveColor = (game.turn() === 'w')? 'White' : 'Black';
  
  if (game.in_checkmate()) {
    status = 'Checkmate! ' + (game.turn() === 'w'? 'Black' : 'White') + ' wins!';
  } else if (game.in_draw()) {
    status = 'Draw!';
  } else if (game.in_check()) {
    status = moveColor + ' to move - IN CHECK!';
  } else {
    status = moveColor + ' to move';
  }
  $('#status').html(status);
}

function startGame(selectedMode) {
  mode = selectedMode;
  game.reset();
  board.start();
  updateStatus();
  
  // Update button styles
  $('#pvpBtn').removeClass('active');
  $('#aiBtn').removeClass('active');
  if (selectedMode === 'pvp') $('#pvpBtn').addClass('active');
  if (selectedMode === 'ai') $('#aiBtn').addClass('active');
}

var config = { 
  draggable: true, 
  position: 'start', 
  onDragStart: onDragStart, 
  onDrop: onDrop, 
  onSnapEnd: onSnapEnd 
};
board = Chessboard('board', config);
updateStatus();
$(window).resize(board.resize);
</script>
</body>
</html>
