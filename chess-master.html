<!DOCTYPE html>
<html>
<head>
<title>Chess Master</title>
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<style>
  body { text-align: center; font-family: Arial; background: #f0d9b5; }
  #board { width: 400px; margin: 20px auto; }
  button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<h1>Chess Master</h1>
<button onclick="startGame('pvp')">2 Player</button>
<button onclick="startGame('ai')">Vs Computer</button>
<div id="board"></div>
<p id="status"></p>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
var board = null;
var game = new Chess();
var mode = 'pvp';

function onDragStart (source, piece) {
  if (game.game_over()) return false;
  if (mode === 'ai' && game.turn() === 'b') return false;
}

function makeAIMove() {
  var possibleMoves = game.moves();
  var randomIdx = Math.floor(Math.random() * possibleMoves.length);
  game.move(possibleMoves[randomIdx]);
  board.position(game.fen());
  updateStatus();
}

function onDrop (source, target) {
  var move = game.move({ from: source, to: target, promotion: 'q' });
  if (move === null) return 'snapback';
  updateStatus();
  if (mode === 'ai' &&!game.game_over()) {
    window.setTimeout(makeAIMove, 250);
  }
}

function onSnapEnd () { board.position(game.fen()); }

function updateStatus() {
  var status = '';
  if (game.in_checkmate()) { status = 'Game over, ' + (game.turn() === 'w'? 'Black' : 'White') + ' wins!'; }
  else if (game.in_draw()) { status = 'Game over, drawn position'; }
  else { status = (game.turn() === 'w'? 'White' : 'Black') + ' to move'; if (game.in_check()) { status += ', in check'; } }
  $('#status').html(status);
}

function startGame(selectedMode) { mode = selectedMode; game.reset(); board.start(); updateStatus(); }

var config = { draggable: true, position: 'start', onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd };
board = Chessboard('board', config);
updateStatus();
</script>
</body>
</html>
