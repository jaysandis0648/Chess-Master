<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chess Master</title>
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@400;600;700&display=swap');
  *{box-sizing:border-box;}
  body {
    background: radial-gradient(ellipse at top, #3a3a3a 0%, #2b2b2b 60%, #1a1a1a 100%);
    display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
    min-height: 100vh; font-family: 'Poppins', sans-serif; color: #ecf0f1; margin: 0;
    padding: 24px 14px 50px;
  }
  h1 {
    color: #e0c097;
    margin: 0 0 4px;
    letter-spacing: 3px;
    font-family: 'Cinzel', serif;
    font-size: clamp(24px,5vw,32px);
    text-shadow: 0 0 15px rgba(224, 192, 151, 0.5);
    text-align: center;
  }
  .tagline{
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #a88a63;
    margin-bottom: 16px;
    text-align: center;
  }

  #modeBar{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:14px;
  }
  .mode-btn{
    padding: 8px 14px;
    background: rgba(139,90,43,0.25);
    color: #e8dcc6;
    border: 1.5px solid #6b4a28;
    border-radius: 20px;
    font-family:'Poppins',sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s ease;
    letter-spacing: .3px;
  }
  .mode-btn:hover{ background: rgba(139,90,43,0.45); }
  .mode-btn.active{
    background: linear-gradient(180deg,#e0c097,#b98c5a);
    color: #2b1d10;
    border-color: #e0c097;
    box-shadow: 0 0 12px rgba(224,192,151,.4);
  }

  /* Online panel */
  #onlinePanel{
    display:none;
    flex-direction:column;
    align-items:center;
    gap:10px;
    background: rgba(62,47,28,0.4);
    border: 1px solid rgba(224,192,151,0.3);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 14px;
    max-width: 360px;
    width: 90vmin;
  }
  #onlinePanel .row{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .online-btn{
    padding: 8px 14px;
    background: #8b5a2b;
    color: #e8dcc6;
    border: 1.5px solid #3e2f1c;
    border-radius: 6px;
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size: 13px;
    cursor:pointer;
  }
  .online-btn:hover{ background:#a66e33; }
  .online-input{
    padding: 8px 10px;
    border-radius: 6px;
    border: 1.5px solid #6b4a28;
    background: #1f1710;
    color: #e8dcc6;
    font-family: 'Poppins', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    width: 110px;
    text-align:center;
  }
  #roomCodeDisplay{
    font-family: 'Cinzel', serif;
    font-size: 26px;
    letter-spacing: 6px;
    color: #e0c097;
    text-shadow: 0 0 12px rgba(224,192,151,.4);
    display:none;
  }
  #onlineStatusText{
    font-size: 12.5px;
    color: #cbb495;
    text-align:center;
    min-height: 16px;
  }

  #info { font-size: 16px; margin-bottom: 14px; font-weight: 600; color: #e0c097; min-height: 22px; text-align:center; }
  #info.check-text{ color:#d9534f; }
  #info.over-text{ color:#8fd19e; }

  .main-area{
    display:flex;
    gap:26px;
    align-items:flex-start;
    flex-wrap:wrap;
    justify-content:center;
    width:100%;
    max-width:900px;
  }

  #board {
    width: 90vmin; max-width: 460px; min-width:260px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    border: 12px solid #3e2f1c;
    border-radius: 4px;
    position:relative;
  }

  .white-1e1d7 { background-color: #e8dcc6 !important; }
  .black-3c85d { background-color: #8b5a2b !important; }

  .piece-417db { transition: transform 0.15s ease; }
  .piece-417db:hover { transform: scale(1.06); }

  .highlight-move { box-shadow: inset 0 0 0 4px rgba(255, 215, 0, 0.85); }
  .highlight-select { box-shadow: inset 0 0 0 4px rgba(120, 200, 255, 0.85); }
  .check-square { box-shadow: inset 0 0 0 4px rgba(200, 0, 0, 0.85); }
  .capture-dot::after{
    content:'';
    position:absolute;
    width:34%; height:34%;
    left:33%; top:33%;
    border-radius:50%;
    background: rgba(255,215,0,0.55);
    pointer-events:none;
  }

  #sidePanel{
    width: 220px;
    min-width: 200px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .panel-box{
    background: rgba(62,47,28,0.35);
    border: 1px solid rgba(224,192,151,0.25);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .panel-label{
    font-size: 10.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #e0c097;
    opacity: .85;
    margin-bottom: 8px;
  }
  .captured-row{
    display:flex;
    flex-wrap:wrap;
    gap:3px;
    min-height: 26px;
  }
  .captured-row img{
    width:22px; height:22px;
    opacity:0;
    animation: popIn .25s ease forwards;
  }
  @keyframes popIn{
    from{ opacity:0; transform:scale(0.4); }
    to{ opacity:1; transform:scale(1); }
  }
  .mat-diff{
    font-family:'Cinzel',serif;
    font-size:13px;
    color:#8fd19e;
    margin-top:6px;
  }

  #controls { margin-top: 18px; display: flex; gap: 10px; flex-wrap:wrap; justify-content:center; }
  button.ctrl {
    padding: 10px 18px; background: #8b5a2b; color: #e8dcc6; border: none;
    border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px;
    border: 2px solid #3e2f1c; font-family: 'Poppins', sans-serif;
    transition: background .15s ease, transform .1s ease;
  }
  button.ctrl:hover { background: #a66e33; transform: translateY(-1px); }
  button.ctrl:active { transform: translateY(1px); }
  button.ctrl:disabled{ opacity:.4; cursor:not-allowed; }
  button.ctrl:disabled:hover{ background:#8b5a2b; transform:none; }

  .modal-overlay{
    position: fixed; inset:0;
    background: rgba(0,0,0,0.65);
    display:none;
    align-items:center;
    justify-content:center;
    z-index: 60;
  }
  .modal-overlay.show{ display:flex; }
  .promo-card{
    background: linear-gradient(160deg,#4a3520,#241a10 80%);
    border: 1px solid #e0c097;
    border-radius: 12px;
    padding: 22px 24px;
    text-align:center;
    box-shadow: 0 20px 50px rgba(0,0,0,.6);
    animation: riseUp .2s ease;
  }
  @keyframes riseUp{ from{ opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);} }
  .promo-title{
    font-family:'Cinzel',serif;
    color:#e0c097;
    font-size:18px;
    margin-bottom:14px;
    letter-spacing:1px;
  }
  .promo-options{
    display:flex;
    gap:10px;
  }
  .promo-opt{
    width:58px;height:58px;
    background: rgba(224,192,151,0.12);
    border:1.5px solid rgba(224,192,151,0.4);
    border-radius:8px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: transform .12s ease, border-color .12s ease;
  }
  .promo-opt:hover{ transform:translateY(-3px); border-color:#e0c097; }
  .promo-opt img{ width:80%; height:80%; }

  .win-card{
    background: linear-gradient(160deg,#4a3520,#241a10 80%);
    border: 2px solid #e0c097;
    border-radius: 14px;
    padding: 30px 36px;
    text-align:center;
    box-shadow: 0 30px 70px rgba(0,0,0,.7);
    animation: riseUp .25s ease;
    max-width:320px;
  }
  .win-title{
    font-family:'Cinzel',serif;
    color:#e0c097;
    font-size: 24px;
    margin-bottom: 8px;
    text-shadow: 0 0 18px rgba(224,192,151,.5);
  }
  .win-sub{
    font-size: 13px;
    color: #cbb495;
    margin-bottom: 18px;
  }
  #confettiCanvas{
    position:fixed; inset:0;
    pointer-events:none;
    z-index: 55;
  }

  @media (max-width:640px){
    .main-area{ flex-direction:column; align-items:center; }
    #sidePanel{ width: 90vmin; max-width:460px; }
  }
</style>
</head>
<body>
<h1>CHESS MASTER</h1>
<div class="tagline">Walnut &amp; Maple Edition</div>

<div id="modeBar">
  <button class="mode-btn active" data-mode="hotseat">2 Players (Hotseat)</button>
  <button class="mode-btn" data-mode="easy">Vs Computer · Easy</button>
  <button class="mode-btn" data-mode="medium">Vs Computer · Medium</button>
  <button class="mode-btn" data-mode="online">Online</button>
</div>

<div id="onlinePanel">
  <div class="row" id="onlineChoiceRow">
    <button class="online-btn" id="createRoomBtn">Create Room</button>
    <button class="online-btn" id="showJoinBtn">Join Room</button>
  </div>
  <div class="row" id="joinRow" style="display:none;">
    <input class="online-input" id="joinCodeInput" maxlength="4" placeholder="CODE">
    <button class="online-btn" id="joinConfirmBtn">Connect</button>
  </div>
  <div id="roomCodeDisplay"></div>
  <div class="row" id="copyRow" style="display:none;">
    <button class="online-btn" id="copyCodeBtn">Copy Code</button>
  </div>
  <div id="onlineStatusText">Create a room or join one with a code.</div>
</div>

<div id="info">White to move</div>

<div class="main-area">
  <div id="board"></div>

  <div id="sidePanel">
    <div class="panel-box">
      <div class="panel-label">Captured by White</div>
      <div class="captured-row" id="capWhite"></div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Captured by Black</div>
      <div class="captured-row" id="capBlack"></div>
      <div class="mat-diff" id="matDiff"></div>
    </div>
  </div>
</div>

<div id="controls">
  <button class="ctrl" id="newGameBtn" onclick="resetGame()">New Game</button>
  <button class="ctrl" onclick="flipBoardNow()">Flip Board</button>
  <button class="ctrl" id="undoBtn" onclick="undoMove()">Undo</button>
</div>

<div class="modal-overlay" id="promoOverlay">
  <div class="promo-card">
    <div class="promo-title">Choose Promotion</div>
    <div class="promo-options" id="promoOptions"></div>
  </div>
</div>

<div class="modal-overlay" id="winOverlay">
  <div class="win-card">
    <div class="win-title" id="winTitle">Checkmate!</div>
    <div class="win-sub" id="winSub">White wins the game</div>
    <button class="ctrl" onclick="closeWinModal(); resetGame();">Play Again</button>
  </div>
</div>

<canvas id="confettiCanvas"></canvas>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let board = null;
let game = new Chess();
let $board = $('#board');
let gameMode = 'hotseat'; // hotseat | easy | medium | online
let aiThinking = false;
let pendingPromotion = null;
let selectedSquare = null;
const PIECE_VALUES = {p:1,n:3,b:3,r:5,q:9,k:0};
const PIECE_IMG_BASE = 'https://chessboardjs.com/img/chesspieces/wikipedia/';

/* ---------------- Online multiplayer state ---------------- */
let peer = null;
let conn = null;
let onlineMyColor = null;   // 'w' or 'b'
let onlineConnected = false;
let onlineFlippedApplied = false;

/* ---------------- Audio (synthesized, no external files) ---------------- */
let audioCtx = null;
function ensureAudio(){
  if (!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, gainVal, delay){
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + (delay||0);
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  gainNode.gain.setValueAtTime(0.0001, t0);
  gainNode.gain.exponentialRampToValueAtTime(gainVal||0.18, t0+0.012);
  gainNode.gain.exponentialRampToValueAtTime(0.0001, t0+duration);
  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0+duration+0.02);
}
function sndMove(){ tone(392,0.11,'sine',0.16,0); }
function sndCapture(){ tone(220,0.09,'square',0.14,0); tone(160,0.12,'square',0.10,0.05); }
function sndCheck(){ tone(600,0.14,'triangle',0.18,0); tone(500,0.16,'triangle',0.15,0.09); }
function sndPromote(){ tone(523,0.09,'sine',0.16,0); tone(659,0.09,'sine',0.16,0.09); tone(784,0.14,'sine',0.18,0.18); }
function sndWin(){ [523,659,784,1046].forEach((f,i)=>tone(f,0.18,'sine',0.18,i*0.13)); }
function sndIllegal(){ tone(140,0.12,'sawtooth',0.12,0); }

/* ---------------- Board config ---------------- */
const config = {
  draggable: true,
  position: 'start',
  pieceTheme: PIECE_IMG_BASE + '{piece}.png',
  moveSpeed: 220,
  snapbackSpeed: 250,
  snapSpeed: 90,
  trashSpeed: 200,
  appearSpeed: 200,
  onDragStart: onDragStart,
  onDrop: onDrop,
  onMouseoverSquare: onMouseoverSquare,
  onMouseoutSquare: onMouseoutSquare,
  onSnapEnd: onSnapEnd
};

function removeHighlights() {
  $board.find('.square-55d63').removeClass('highlight-move highlight-select check-square capture-dot');
}

function highlightLegalMoves(square){
  const moves = game.moves({ square: square, verbose: true });
  $(`[data-square="${square}"]`).addClass('highlight-select');
  moves.forEach(m=>{
    const el = $(`[data-square="${m.to}"]`);
    el.addClass('highlight-move');
    if (m.captured) el.addClass('capture-dot');
  });
}

function onDragStart (source, piece) {
  ensureAudio();
  if (game.game_over()) return false;
  if (aiThinking) return false;
  if (piece.search(new RegExp('^' + game.turn())) === -1) return false;

  if (gameMode === 'easy' || gameMode === 'medium'){
    if (game.turn() === 'b') return false; // AI's pieces
  }
  if (gameMode === 'online'){
    if (!onlineConnected) return false;
    if (onlineMyColor !== game.turn()) return false;
    if (piece.search(new RegExp('^' + onlineMyColor)) === -1) return false;
  }

  removeHighlights();
  highlightLegalMoves(source);
}

function isPromotionMove(source, target){
  const piece = game.get(source);
  if (!piece || piece.type !== 'p') return false;
  return (piece.color === 'w' && target[1] === '8') || (piece.color === 'b' && target[1] === '1');
}

function onDrop (source, target) {
  removeHighlights();
  if (source === target) return;

  if (isPromotionMove(source, target)){
    const legal = game.moves({ square: source, verbose:true }).some(m=>m.to===target);
    if (!legal){ sndIllegal(); return 'snapback'; }
    pendingPromotion = { from: source, to: target };
    showPromotionModal(game.get(source).color);
    return 'snapback';
  }

  const move = game.move({ from: source, to: target });
  if (move === null) { sndIllegal(); return 'snapback'; }

  playMoveSounds(move);
  updateStatus();
  updateCaptured();
  if (gameMode === 'online') sendOnline({ type:'move', from: source, to: target });
  maybeTriggerAI();
}

function onMouseoverSquare(square) {
  if (selectedSquare) return;
  const moves = game.moves({ square: square, verbose: true });
  if (moves.length === 0) return;
  $(`[data-square="${square}"]`).addClass('highlight-select');
  moves.forEach(m=>{
    const el = $(`[data-square="${m.to}"]`);
    el.addClass('highlight-move');
    if (m.captured) el.addClass('capture-dot');
  });
}
function onMouseoutSquare() { if (!selectedSquare) removeHighlights(); }
function onSnapEnd () { board.position(game.fen()); markCheckSquare(); }

/* ---------------- Promotion ---------------- */
function showPromotionModal(color){
  const opts = document.getElementById('promoOptions');
  opts.innerHTML = '';
  ['q','r','b','n'].forEach(type=>{
    const wrap = document.createElement('div');
    wrap.className = 'promo-opt';
    const img = document.createElement('img');
    img.src = PIECE_IMG_BASE + color + type.toUpperCase() + '.png';
    wrap.appendChild(img);
    wrap.addEventListener('click', ()=>{
      const move = game.move({ from: pendingPromotion.from, to: pendingPromotion.to, promotion: type });
      const fromSq = pendingPromotion.from, toSq = pendingPromotion.to;
      document.getElementById('promoOverlay').classList.remove('show');
      pendingPromotion = null;
      if (move){
        board.position(game.fen());
        sndPromote();
        updateStatus();
        updateCaptured();
        if (gameMode === 'online') sendOnline({ type:'move', from: fromSq, to: toSq, promotion: type });
        maybeTriggerAI();
      }
    });
    opts.appendChild(wrap);
  });
  document.getElementById('promoOverlay').classList.add('show');
}

/* ---------------- Status / check / win ---------------- */
function markCheckSquare(){
  $board.find('.square-55d63').removeClass('check-square');
  if (game.in_check()){
    let kingPos = '';
    game.board().forEach((row, r) => row.forEach((p, c) => {
      if (p && p.type === 'k' && p.color === game.turn()) kingPos = 'abcdefgh'[c] + (8-r);
    }));
    if (kingPos) $(`[data-square="${kingPos}"]`).addClass('check-square');
  }
}

function updateStatus() {
  const infoEl = document.getElementById('info');
  infoEl.classList.remove('check-text','over-text');
  let status = '';
  let moveColor = game.turn() === 'w' ? 'White' : 'Black';

  markCheckSquare();

  if (game.in_checkmate()) {
    const winner = moveColor === 'White' ? 'Black' : 'White';
    status = `Checkmate! ${winner} wins`;
    infoEl.classList.add('over-text');
    setTimeout(()=> showWinModal(`${winner} Wins!`, 'By checkmate', true), 350);
  } else if (game.in_stalemate()) {
    status = 'Stalemate — Draw';
    infoEl.classList.add('over-text');
    setTimeout(()=> showWinModal('Stalemate', 'The game is a draw', false), 350);
  } else if (game.in_draw()) {
    status = 'Draw';
    infoEl.classList.add('over-text');
    setTimeout(()=> showWinModal('Draw', 'Insufficient material or repetition', false), 350);
  } else if (game.in_check()) {
    status = moveColor + ' is in check';
    infoEl.classList.add('check-text');
  } else {
    status = moveColor + ' to move';
    if ((gameMode === 'easy' || gameMode === 'medium') && moveColor === 'Black') status += ' (thinking…)';
    if (gameMode === 'online' && onlineConnected){
      status += (moveColor.toLowerCase()[0] === onlineMyColor) ? ' (you)' : ' (opponent)';
    }
  }
  infoEl.innerHTML = status;
}

function playMoveSounds(move){
  if (move.captured) sndCapture();
  else sndMove();
  if (game.in_check() && !game.game_over()) setTimeout(sndCheck, 90);
}

function showWinModal(title, sub, confetti){
  document.getElementById('winTitle').textContent = title;
  document.getElementById('winSub').textContent = sub;
  document.getElementById('winOverlay').classList.add('show');
  sndWin();
  if (confetti) launchConfetti();
}
function closeWinModal(){
  document.getElementById('winOverlay').classList.remove('show');
  stopConfetti();
}

/* ---------------- Captured pieces ---------------- */
function updateCaptured(){
  const history = game.history({ verbose: true });
  const byWhite = [];
  const byBlack = [];
  history.forEach(m=>{
    if (m.captured){
      const capturedColor = m.color === 'w' ? 'b' : 'w';
      if (m.color === 'w') byWhite.push({type:m.captured, color:capturedColor});
      else byBlack.push({type:m.captured, color:capturedColor});
    }
  });
  renderCapturedRow('capWhite', byWhite);
  renderCapturedRow('capBlack', byBlack);

  const whiteVal = byWhite.reduce((s,p)=>s+PIECE_VALUES[p.type],0);
  const blackVal = byBlack.reduce((s,p)=>s+PIECE_VALUES[p.type],0);
  const diff = whiteVal - blackVal;
  const diffEl = document.getElementById('matDiff');
  if (diff === 0) diffEl.textContent = '';
  else diffEl.textContent = diff > 0 ? `White +${diff}` : `Black +${-diff}`;
}
function renderCapturedRow(elId, pieces){
  const el = document.getElementById(elId);
  el.innerHTML = '';
  pieces.sort((a,b)=>PIECE_VALUES[b.type]-PIECE_VALUES[a.type]).forEach(p=>{
    const img = document.createElement('img');
    img.src = PIECE_IMG_BASE + p.color + p.type.toUpperCase() + '.png';
    el.appendChild(img);
  });
}

/* ---------------- Confetti (vanilla canvas) ---------------- */
let confettiParticles = [];
let confettiAnimId = null;
const confettiCanvas = document.getElementById('confettiCanvas');
const ctx = confettiCanvas.getContext('2d');
function resizeConfettiCanvas(){
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfettiCanvas);
resizeConfettiCanvas();

function launchConfetti(){
  resizeConfettiCanvas();
  confettiParticles = [];
  const colors = ['#e0c097','#8b5a2b','#f4e9b8','#d9534f','#8fd19e','#ecf0f1'];
  for (let i=0;i<140;i++){
    confettiParticles.push({
      x: Math.random()*confettiCanvas.width,
      y: -20 - Math.random()*confettiCanvas.height*0.5,
      w: 6+Math.random()*6,
      h: 8+Math.random()*10,
      color: colors[Math.floor(Math.random()*colors.length)],
      speed: 2+Math.random()*3,
      drift: -1.5+Math.random()*3,
      rot: Math.random()*360,
      rotSpeed: -6+Math.random()*12
    });
  }
  let startTime = Date.now();
  function frame(){
    ctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
    confettiParticles.forEach(p=>{
      p.y += p.speed;
      p.x += p.drift;
      p.rot += p.rotSpeed;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    if (Date.now()-startTime < 3200){
      confettiAnimId = requestAnimationFrame(frame);
    } else {
      ctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
    }
  }
  if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
  frame();
}
function stopConfetti(){
  if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
  ctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
}

/* ---------------- Computer AI ---------------- */
function shuffle(arr){
  for (let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}
function evaluateBoard(){
  let total = 0;
  game.board().forEach(row=>row.forEach(sq=>{
    if (sq){
      const v = PIECE_VALUES[sq.type];
      total += sq.color === 'w' ? v : -v;
    }
  }));
  return total;
}
function minimax(depth, alpha, beta, maximizing){
  if (depth === 0 || game.game_over()) return evaluateBoard();
  const moves = shuffle(game.moves());
  if (maximizing){
    let maxEval = -Infinity;
    for (const m of moves){
      game.move(m);
      const val = minimax(depth-1, alpha, beta, false);
      game.undo();
      if (val > maxEval) maxEval = val;
      if (val > alpha) alpha = val;
      if (beta <= alpha) break;
    }
    return maxEval;
  } else {
    let minEval = Infinity;
    for (const m of moves){
      game.move(m);
      const val = minimax(depth-1, alpha, beta, true);
      game.undo();
      if (val < minEval) minEval = val;
      if (val < beta) beta = val;
      if (beta <= alpha) break;
    }
    return minEval;
  }
}
function computerPickEasy(){
  const moves = game.moves();
  return moves[Math.floor(Math.random()*moves.length)];
}
function computerPickMedium(){
  const moves = shuffle(game.moves());
  let bestMove = moves[0];
  let bestVal = Infinity;
  for (const m of moves){
    game.move(m);
    const val = minimax(2, -Infinity, Infinity, true);
    game.undo();
    if (val < bestVal){
      bestVal = val;
      bestMove = m;
    }
  }
  return bestMove;
}
function maybeTriggerAI(){
  if (gameMode !== 'easy' && gameMode !== 'medium') return;
  if (game.game_over()) return;
  if (game.turn() !== 'b') return;
  aiThinking = true;
  updateStatus();
  setTimeout(()=>{
    const san = gameMode === 'easy' ? computerPickEasy() : computerPickMedium();
    const move = game.move(san);
    aiThinking = false;
    if (move){
      board.position(game.fen());
      playMoveSounds(move);
      updateStatus();
      updateCaptured();
    }
  }, 380);
}

/* ---------------- Online multiplayer (PeerJS / WebRTC) ---------------- */
function onlineStatus(msg){
  document.getElementById('onlineStatusText').textContent = msg;
}
function genRoomCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i=0;i<4;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}
function teardownOnlinePeer(){
  if (conn){ try{ conn.close(); }catch(e){} }
  if (peer){ try{ peer.destroy(); }catch(e){} }
  peer = null;
  conn = null;
  onlineMyColor = null;
  onlineConnected = false;
  onlineFlippedApplied = false;
  document.getElementById('roomCodeDisplay').style.display = 'none';
  document.getElementById('copyRow').style.display = 'none';
  document.getElementById('joinRow').style.display = 'none';
  document.getElementById('onlineChoiceRow').style.display = 'flex';
}

function createOnlineRoom(){
  teardownOnlinePeer();
  onlineStatus('Creating room…');
  attemptCreate(0);
}
function attemptCreate(retries){
  const code = genRoomCode();
  peer = new Peer('chessmaster-' + code);
  peer.on('open', ()=>{
    document.getElementById('roomCodeDisplay').textContent = code;
    document.getElementById('roomCodeDisplay').style.display = 'block';
    document.getElementById('copyRow').style.display = 'flex';
    document.getElementById('onlineChoiceRow').style.display = 'none';
    onlineStatus('Share this code — waiting for opponent…');
    peer._roomCode = code;
  });
  peer.on('connection', c=>{
    conn = c;
    conn.on('open', ()=> setupOnlineConnection('w'));
    conn.on('data', handleOnlineMessage);
    conn.on('close', ()=>{ onlineStatus('Opponent disconnected.'); onlineConnected = false; });
  });
  peer.on('error', err=>{
    if (err.type === 'unavailable-id' && retries < 5){
      if (peer) peer.destroy();
      attemptCreate(retries+1);
    } else {
      onlineStatus('Could not create a room. Try again.');
    }
  });
}

function joinOnlineRoom(codeRaw){
  teardownOnlinePeer();
  const code = (codeRaw||'').trim().toUpperCase();
  if (code.length !== 4){ onlineStatus('Enter the 4-character code.'); return; }
  onlineStatus('Connecting…');
  peer = new Peer();
  peer.on('open', ()=>{
    conn = peer.connect('chessmaster-' + code, { reliable: true });
    conn.on('open', ()=> setupOnlineConnection('b'));
    conn.on('data', handleOnlineMessage);
    conn.on('close', ()=>{ onlineStatus('Opponent disconnected.'); onlineConnected = false; });
    conn.on('error', ()=> onlineStatus('Could not find that room.'));
  });
  peer.on('error', ()=> onlineStatus('Connection error — check the code and try again.'));
}

function setupOnlineConnection(color){
  onlineMyColor = color;
  onlineConnected = true;
  game.reset();
  board.start();
  if (color === 'b' && !onlineFlippedApplied){
    board.flip();
    onlineFlippedApplied = true;
  }
  removeHighlights();
  updateStatus();
  updateCaptured();
  onlineStatus('Connected! You are ' + (color === 'w' ? 'White' : 'Black') + '.');
  document.getElementById('undoBtn').disabled = true;
}

function handleOnlineMessage(data){
  if (!data || !data.type) return;
  if (data.type === 'move'){
    const move = game.move({ from: data.from, to: data.to, promotion: data.promotion });
    if (move){
      board.position(game.fen());
      playMoveSounds(move);
      updateStatus();
      updateCaptured();
    }
  } else if (data.type === 'reset'){
    game.reset();
    board.position('start');
    removeHighlights();
    closeWinModal();
    updateStatus();
    updateCaptured();
  }
}
function sendOnline(data){
  if (conn && conn.open) conn.send(data);
}

/* ---------------- Controls ---------------- */
function resetGame() {
  if (gameMode === 'online'){
    if (!onlineConnected){ return; }
    if (onlineMyColor === 'b'){
      onlineStatus('Only the host (White) can start a new game.');
      return;
    }
    sendOnline({ type:'reset' });
  }
  closeWinModal();
  game.reset();
  aiThinking = false;
  pendingPromotion = null;
  board.start();
  removeHighlights();
  updateStatus();
  updateCaptured();
}
function undoMove() {
  if (gameMode === 'online'){
    onlineStatus('Undo is disabled in online games.');
    return;
  }
  if (aiThinking) return;
  game.undo();
  if ((gameMode === 'easy' || gameMode === 'medium') && game.history().length > 0 && game.turn() === 'b'){
    game.undo();
  }
  board.position(game.fen());
  removeHighlights();
  updateStatus();
  updateCaptured();
}
function flipBoardNow(){ board.flip(); }

document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const newMode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    if (newMode !== 'online'){
      teardownOnlinePeer();
      document.getElementById('onlinePanel').style.display = 'none';
      document.getElementById('undoBtn').disabled = false;
      gameMode = newMode;
      resetGame();
    } else {
      gameMode = 'online';
      document.getElementById('onlinePanel').style.display = 'flex';
      document.getElementById('onlineChoiceRow').style.display = 'flex';
      document.getElementById('joinRow').style.display = 'none';
      document.getElementById('roomCodeDisplay').style.display = 'none';
      document.getElementById('copyRow').style.display = 'none';
      onlineStatus('Create a room or join one with a code.');
      document.getElementById('undoBtn').disabled = true;
    }
  });
});

document.getElementById('createRoomBtn').addEventListener('click', createOnlineRoom);
document.getElementById('showJoinBtn').addEventListener('click', ()=>{
  document.getElementById('joinRow').style.display = 'flex';
  document.getElementById('onlineChoiceRow').style.display = 'none';
});
document.getElementById('joinConfirmBtn').addEventListener('click', ()=>{
  joinOnlineRoom(document.getElementById('joinCodeInput').value);
});
document.getElementById('joinCodeInput').addEventListener('keydown', e=>{
  if (e.key === 'Enter') joinOnlineRoom(document.getElementById('joinCodeInput').value);
});
document.getElementById('copyCodeBtn').addEventListener('click', ()=>{
  const code = document.getElementById('roomCodeDisplay').textContent;
  if (navigator.clipboard && code){
    navigator.clipboard.writeText(code).then(()=> onlineStatus('Code copied! Send it to your opponent.'));
  }
});

board = Chessboard('board', config);
updateStatus();
updateCaptured();
